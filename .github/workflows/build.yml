name: Build Standalone Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
          python -m spacy download en_core_web_sm
      - name: Build with PyInstaller
        working-directory: backend
        run: |
          pyinstaller --name folio-enrich \
            --noconfirm \
            --onedir \
            --add-data "app:app" \
            --add-data "../frontend:frontend" \
            --add-data "$(python -c 'import en_core_web_sm; print(en_core_web_sm.__path__[0])'):en_core_web_sm" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import app.main \
            --hidden-import app.api.routes.enrich \
            --hidden-import app.api.routes.export \
            --hidden-import app.api.routes.health \
            --hidden-import app.api.routes.settings \
            --hidden-import app.api.routes.ollama \
            --hidden-import app.api.routes.concepts \
            --hidden-import app.api.routes.feedback \
            --hidden-import app.api.routes.synthetic \
            --hidden-import spacy \
            --hidden-import en_core_web_sm \
            --hidden-import thinc \
            --hidden-import httpx \
            --hidden-import sse_starlette \
            --hidden-import psutil \
            --collect-submodules spacy \
            --collect-submodules thinc \
            --exclude-module pytest \
            --exclude-module _pytest \
            run.py
      - name: Create launcher script
        working-directory: backend
        run: |
          cat > dist/folio-enrich/run.py << 'PYEOF'
          import subprocess, sys, webbrowser, time, threading
          def open_browser():
              time.sleep(2)
              webbrowser.open("http://localhost:8731")
          threading.Thread(target=open_browser, daemon=True).start()
          subprocess.run([sys.executable, "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8731"])
          PYEOF
      - name: Package
        run: tar -czf folio-enrich-linux-x64.tar.gz -C backend/dist folio-enrich
      - uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: folio-enrich-linux-x64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
          python -m spacy download en_core_web_sm
      - name: Build with PyInstaller
        working-directory: backend
        shell: bash
        run: |
          SPACY_DATA=$(python -c "import en_core_web_sm; print(en_core_web_sm.__path__[0])")
          pyinstaller --name folio-enrich \
            --noconfirm \
            --onedir \
            --add-data "app;app" \
            --add-data "../frontend;frontend" \
            --add-data "${SPACY_DATA};en_core_web_sm" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import app.main \
            --hidden-import app.api.routes.enrich \
            --hidden-import app.api.routes.export \
            --hidden-import app.api.routes.health \
            --hidden-import app.api.routes.settings \
            --hidden-import app.api.routes.ollama \
            --hidden-import app.api.routes.concepts \
            --hidden-import app.api.routes.feedback \
            --hidden-import app.api.routes.synthetic \
            --hidden-import spacy \
            --hidden-import en_core_web_sm \
            --hidden-import thinc \
            --hidden-import httpx \
            --hidden-import sse_starlette \
            --hidden-import psutil \
            --collect-submodules spacy \
            --collect-submodules thinc \
            --exclude-module pytest \
            --exclude-module _pytest \
            run.py
      - name: Package
        run: Compress-Archive -Path backend\dist\folio-enrich -DestinationPath folio-enrich-windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: folio-enrich-windows-x64.zip

  build-windows-arm64:
    runs-on: windows-11-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        shell: bash
        run: |
          # Some packages (e.g. PyMuPDF) lack ARM64 Windows wheels.
          # Try full install first; on failure, install deps individually.
          pip install -e ".[dev]" 2>&1 || {
            echo "::warning::Standard install failed, installing deps individually..."
            pip install --no-deps -e .
            python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              cfg = tomllib.load(f)
          deps = cfg['project']['dependencies']
          deps += cfg['project'].get('optional-dependencies', {}).get('dev', [])
          print('\n'.join(deps))
          " | while IFS= read -r dep; do
              pip install "$dep" 2>&1 || echo "::warning::Skipped: $dep (not available for this platform)"
            done
          }
          pip install pyinstaller
          python -m spacy download en_core_web_sm
      - name: Build with PyInstaller
        working-directory: backend
        shell: bash
        run: |
          SPACY_DATA=$(python -c "import en_core_web_sm; print(en_core_web_sm.__path__[0])")
          pyinstaller --name folio-enrich \
            --noconfirm \
            --onedir \
            --add-data "app;app" \
            --add-data "../frontend;frontend" \
            --add-data "${SPACY_DATA};en_core_web_sm" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import app.main \
            --hidden-import app.api.routes.enrich \
            --hidden-import app.api.routes.export \
            --hidden-import app.api.routes.health \
            --hidden-import app.api.routes.settings \
            --hidden-import app.api.routes.ollama \
            --hidden-import app.api.routes.concepts \
            --hidden-import app.api.routes.feedback \
            --hidden-import app.api.routes.synthetic \
            --hidden-import spacy \
            --hidden-import en_core_web_sm \
            --hidden-import thinc \
            --hidden-import httpx \
            --hidden-import sse_starlette \
            --hidden-import psutil \
            --collect-submodules spacy \
            --collect-submodules thinc \
            --exclude-module pytest \
            --exclude-module _pytest \
            run.py
      - name: Package
        run: Compress-Archive -Path backend\dist\folio-enrich -DestinationPath folio-enrich-windows-arm64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: folio-enrich-windows-arm64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -e ".[dev]"
          pip install pyinstaller
          python -m spacy download en_core_web_sm
      - name: Build with PyInstaller
        working-directory: backend
        run: |
          pyinstaller --name folio-enrich \
            --noconfirm \
            --onedir \
            --add-data "app:app" \
            --add-data "../frontend:frontend" \
            --add-data "$(python -c 'import en_core_web_sm; print(en_core_web_sm.__path__[0])'):en_core_web_sm" \
            --hidden-import uvicorn \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import app.main \
            --hidden-import app.api.routes.enrich \
            --hidden-import app.api.routes.export \
            --hidden-import app.api.routes.health \
            --hidden-import app.api.routes.settings \
            --hidden-import app.api.routes.ollama \
            --hidden-import app.api.routes.concepts \
            --hidden-import app.api.routes.feedback \
            --hidden-import app.api.routes.synthetic \
            --hidden-import spacy \
            --hidden-import en_core_web_sm \
            --hidden-import thinc \
            --hidden-import httpx \
            --hidden-import sse_starlette \
            --hidden-import psutil \
            --collect-submodules spacy \
            --collect-submodules thinc \
            --exclude-module pytest \
            --exclude-module _pytest \
            run.py
      - name: Package
        run: tar -czf folio-enrich-macos-arm64.tar.gz -C backend/dist folio-enrich
      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: folio-enrich-macos-arm64.tar.gz

  release:
    needs: [build-linux, build-windows, build-windows-arm64, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            folio-enrich-linux-x64.tar.gz
            folio-enrich-windows-x64.zip
            folio-enrich-windows-arm64.zip
            folio-enrich-macos-arm64.tar.gz
          generate_release_notes: true
